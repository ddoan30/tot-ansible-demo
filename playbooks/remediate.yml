---
- name: Remediation
  hosts: vm2.lab.local
  become: yes
  
  tasks:
    - name: Ensure httpd service is started
      ansible.builtin.systemd:
        name: httpd
        state: started
        enabled: yes
      become: true
 
    - name: Log the deployment
      ansible.builtin.debug:
        msg: "Arduino remediate.ino deployed successfully! Normal behavior resumed."
      #when: upload_result.rc == 0
      
