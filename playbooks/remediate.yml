---
- name: Remediation
  hosts: vm3.lab.local
  become: yes
  gather_facts: no
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_pipelining: true
    
  tasks:
    - name: Ensure httpd service is started
      ansible.builtin.systemd:
        name: httpd
        state: started
        enabled: yes
      become: true
 
    - name: Log the deployment
      ansible.builtin.debug:
        msg: "httpd service restored. Normal behavior resumed."
      #when: upload_result.rc == 0
      
