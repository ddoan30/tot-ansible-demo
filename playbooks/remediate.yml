---
- name: Remediation
  hosts: vm2.lab.local
  become: yes
  # vars:
  #   ansible_become_user: shadow
  #   ansible_become_password: redhat
    
  tasks:
    - name: Ensure httpd service is started
      ansible.builtin.systemd:
        name: httpd
        state: started
      register: service_result
      ignore_errors: yes

    - name: Debug service failure
      ansible.builtin.debug:
        var: service_result
      when: service_result is failed

    - name: Log the deployment
      ansible.builtin.debug:
        msg: "Arduino remediate.ino deployed successfully! Normal behavior resumed."
      when: upload_result.rc == 0
      
