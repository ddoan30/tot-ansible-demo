---
- name: Monitor Lightbulb Status
  hosts: all
  sources:
    - name: webhook
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000 
  
  rules:
    - name: Stop HTTPD when light is OFF
      condition: event.payload.status == "OFF"
      action:
        run_job_template:
          name: "httpd_off"
          organization: "Default"
